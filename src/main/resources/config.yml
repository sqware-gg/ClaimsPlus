# ClaimsPlus
# Used for update checks.
# Do not change unless you know what you are doing.
config-version: 8

claims:
  # Placing this block creates a claim.
  claim-block: EMERALD_BLOCK

  # The protected square width and length. A value of 32 protects a 32x32 column.
  size: 32

  # -1 means unlimited claims per player.
  max-claims-per-player: -1

  # Prevents new emerald block claims from overlapping existing claims.
  prevent-overlap: true

  # Worlds listed here cannot create claims and are not protected by this plugin.
  disabled-worlds: []

storage:
  # How often claims are persisted to claims.yml.
  save-interval-seconds: 300

  # Saves immediately after claim creation, deletion, and trust changes.
  save-on-change: true

trust:
  # When false, /trust only accepts online players or players who have joined before.
  allow-unknown-players: false

protection:
  blocks: true
  containers: true
  entities: true
  explosions: true
  pistons: true
  fluids: true
  hoppers: true
  fire: true

visual-border:
  # Sends temporary fake blocks to the player after they create a claim.
  # This does not place real blocks in the world.
  enabled: true

  # Examples: GLOWSTONE, GLASS, LIME_STAINED_GLASS, SEA_LANTERN.
  material: GLOWSTONE

  duration-seconds: 8

  # Relative to the emerald block Y level. 1 draws the border just above the claim block height.
  height-offset: 1

  # Vertical fake-block layers to draw. Keep this low; 1 or 2 is usually enough.
  layers: 1

feedback:
  # Prevents chat/sound spam when a player repeatedly tries blocked actions.
  protected-cooldown-millis: 1200

  sounds:
    enabled: true

    # Applied to all ClaimsPlus sounds.
    volume: 0.65
    pitch: 1.0

    # Set any sound to "none" to disable that category.
    success: entity.experience_orb.pickup
    error: block.note_block.bass
    protected: entity.villager.no
    claim-created: entity.player.levelup
    claim-removed: block.beacon.deactivate
    trust: entity.experience_orb.pickup
    border: block.amethyst_block.chime

